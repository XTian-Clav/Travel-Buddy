<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <title>Travel Buddy | Custom Itinerary</title>
  </head>

  <body>
    <nav>
      <div class="nav__header">
        <div class="nav__logo">
          <a href="landing.html">
            <img src="assets/logo.svg" alt="logo" />
          </a>
        </div>

        <div class="nav__menu__btn" id="menu-btn">
          <i class="ri-menu-3-line"></i>
        </div>
      </div>

      <ul class="nav__links" id="nav-links">
        <div class="nav__buttons">
          <li>
            <a href="home.html">
              <button class="outlined__btn">
                <i class="ri-arrow-left-line"></i>
                Back To Home
              </button>
            </a>
          </li>
        </div>
      </ul>
    </nav>

    <header class="custom__hero">
      <div class="custom__overlay">
        <div class="custom__content">
          <h1>Create Your Own Adventure</h1>
          <p>
            Choose your destination and customize activities based on your
            preferred travel experience.
          </p>
        </div>
      </div>
    </header>

    <section class="wizard">
      <div class="section__container wizard__container">
        <div class="wizard__steps">
          <div class="wizard__step active">
            <span>1</span>
            <p>Choose Destination</p>
          </div>
          <div class="wizard__line"></div>
          <div class="wizard__step">
            <span>2</span>
            <p>Add Activities</p>
          </div>
          <div class="wizard__line"></div>
          <div class="wizard__step">
            <span>3</span>
            <p>Review & Save</p>
          </div>
        </div>
        <div class="wizard__header">
          <h2>Select Your Destination</h2>
          <p>
            Start by choosing where you want your customized trip to take place.
          </p>
        </div>
        <div class="wizard__destination__grid">
          <!-- EL NIDO -->
          <a href="custom-activities.html" class="wizard__destination__card">
            <img src="assets/big-lagoon.jpg" alt="El Nido" />
            <div class="wizard__destination__overlay">
              <div class="wizard__destination__badge">
                El Nido
                <i class="ri-arrow-right-line"></i>
              </div>
            </div>
          </a>
          <!-- CORON -->
          <a href="custom-activities.html" class="wizard__destination__card">
            <img src="assets/coron.jpg" alt="Coron" />
            <div class="wizard__destination__overlay">
              <div class="wizard__destination__badge">
                Coron
                <i class="ri-arrow-right-line"></i>
              </div>
            </div>
          </a>
        </div>
      </div>
    </section>
  </body>
</html>
